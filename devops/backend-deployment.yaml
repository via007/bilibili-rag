apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: bilibili-rag
  labels:
    app.kubernetes.io/name: bilibili-rag
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  strategy:
    type: Recreate  # SQLite 单写，不可多副本并发
  selector:
    matchLabels:
      app.kubernetes.io/name: bilibili-rag
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bilibili-rag
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: bilibili-rag-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: bilibili-rag-config
            - secretRef:
                name: bilibili-rag-secret
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: logs
              mountPath: /app/logs
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: backend-data-pvc
        - name: logs
          persistentVolumeClaim:
            claimName: backend-logs-pvc
