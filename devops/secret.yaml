apiVersion: v1
kind: Secret
metadata:
  name: bilibili-rag-secret
  namespace: bilibili-rag
  labels:
    app.kubernetes.io/name: bilibili-rag
type: Opaque
stringData:
  # LLM API Keys — 部署前替换为真实值
  DASHSCOPE_API_KEY: "<your-dashscope-api-key>"
  OPENAI_API_KEY: "<your-openai-api-key>"
  # LangSmith
  LANGSMITH_API_KEY: "<your-langsmith-api-key>"
  # Encryption Key (32 bytes, base64) — 生成: python -c "import base64, os; print(base64.b64encode(os.urandom(32)).decode())"
  API_KEY_ENCRYPTION_KEY: "<your-encryption-key>"
