version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bilibili-rag-backend
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - backend_data:/app/data
      - backend_logs:/app/logs
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - DEBUG=${DEBUG:-false}
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:///./data/bilibili_rag.db}
      - CHROMA_PERSIST_DIRECTORY=${CHROMA_PERSIST_DIRECTORY:-./data/chroma_db}
      # LLM
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - LLM_MODEL=${LLM_MODEL:-qwen3-max}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-v4}
      # ASR
      - DASHSCOPE_BASE_URL=${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/api/v1}
      - ASR_MODEL=${ASR_MODEL:-paraformer-v2}
      # LangSmith
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-false}
      - LANGSMITH_TRACING=${LANGSMITH_TRACING:-false}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY:-}
      - LANGSMITH_PROJECT=${LANGSMITH_PROJECT:-bilibili-rag}
      - LANGSMITH_ENDPOINT=${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
      # Encryption
      - API_KEY_ENCRYPTION_KEY=${API_KEY_ENCRYPTION_KEY}
      # Agentic RAG
      - AGENTIC_RAG_TOP_K=${AGENTIC_RAG_TOP_K:-5}
      - AGENTIC_RAG_MAX_HOPS=${AGENTIC_RAG_MAX_HOPS:-3}
      # Chunking
      - CHUNK_TARGET_SIZE=${CHUNK_TARGET_SIZE:-750}
      - CHUNK_MIN_SIZE=${CHUNK_MIN_SIZE:-300}
      - CHUNK_MAX_SIZE=${CHUNK_MAX_SIZE:-900}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-100}
      - EMBEDDING_VERSION=${EMBEDDING_VERSION:-v1}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bilibili-rag-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://backend:8000}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend_data:
  backend_logs:
