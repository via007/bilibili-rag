<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
  <!-- top layer -->
  <rect x="5" y="2" width="14" height="16" rx="1.8" stroke="currentColor" stroke-width="1.5" fill="currentColor" fill-opacity="0.06"/>
  <!-- bottom layer shadow -->
  <rect x="3" y="5" width="14" height="16" rx="1.8" stroke="currentColor" stroke-width="1.2" fill="currentColor" fill-opacity="0.03" stroke-opacity="0.3"/>
  <!-- vector dots on top layer -->
  <circle cx="9" cy="7" r="0.8" fill="currentColor" fill-opacity="0.5"/>
  <circle cx="12" cy="7" r="0.8" fill="currentColor" fill-opacity="0.3"/>
  <circle cx="15" cy="7" r="0.8" fill="currentColor" fill-opacity="0.7"/>
  <circle cx="9" cy="10" r="0.8" fill="currentColor" fill-opacity="0.7"/>
  <circle cx="12" cy="10" r="0.8" fill="currentColor" fill-opacity="0.5"/>
  <circle cx="15" cy="10" r="0.8" fill="currentColor" fill-opacity="0.3"/>
  <circle cx="9" cy="13" r="0.8" fill="currentColor" fill-opacity="0.3"/>
  <circle cx="12" cy="13" r="0.8" fill="currentColor" fill-opacity="0.7"/>
  <circle cx="15" cy="13" r="0.8" fill="currentColor" fill-opacity="0.5"/>
  <!-- connecting lines -->
  <line x1="9" y1="10" x2="12" y2="7" stroke="currentColor" stroke-width="0.4" stroke-opacity="0.3"/>
  <line x1="12" y1="10" x2="15" y2="7" stroke="currentColor" stroke-width="0.4" stroke-opacity="0.3"/>
  <line x1="15" y1="10" x2="12" y2="13" stroke="currentColor" stroke-width="0.4" stroke-opacity="0.3"/>
</svg>
